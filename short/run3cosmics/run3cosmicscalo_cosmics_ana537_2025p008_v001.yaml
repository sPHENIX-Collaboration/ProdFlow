#______________________________________________________________________________________________________________________
Full_TRIGGERED_EVENT_run3cosmics:
  params:
    dsttype:    DST_TRIGGERED_EVENT
    period:     run3cosmics
    physicsmode: cosmics
    dataset:    run3cosmics
    build:      ana.537
    dbtag:      nocdbtag
    version:    1

  input:
    db:          rawr
    table:       datasets
    min_run_time:   300
    min_run_events: 100000
    combine_seg0_only: false

  job:
    script:                 run_eventcombine.sh
    log:                   '{condor}/{logbase}.condor'
    neventsper:             10000
    payload:                [calo_code/*]
    request_memory:         2024MB
    request_xferslots:     '3'    
    batch_name:            '{dsttype}_{dataset}_{outtriplet}'
    priority:              '90'
    filesystem:
      logdir:   "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/log"
      histdir:  "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/hist"


#______________________________________________________________________________________________________________________
Full_CALOFITTING_run3cosmics:
  params:
    dsttype:     DST_CALOFITTING
    period:      run3cosmics
    physicsmode: cosmics
    dataset:     run3cosmics
    build:       ana.537
    dbtag:       2025p008
    version:     1

  input:
    db:          fcr
    table:       datasets
    intriplet:   ana537_nocdbtag_v001

  job:
    script:                 run_hcalcosmics.sh
    log:                   '{condor}/{logbase}.condor'
    neventsper:             100000
    payload:                [calo_code/*]
    request_memory:         2500MB
    request_cpus:          '1'
    batch_name:            '{dsttype}_{dataset}_{outtriplet}'
    priority:              '60'
    filesystem:
      logdir:   "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/log"
      histdir:  "/sphenix/data/data03/sphnxpro/{prodmode}/{period}/{physicsmode}/{outtriplet}/{leafdir}/{rungroup}/hist"

